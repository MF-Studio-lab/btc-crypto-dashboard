<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/Professor15/Bitcoinsvg@main/BTC_flat.svg">
  <title>加密貨幣行情儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #21262d;
      flex-wrap: wrap;
      gap: 15px;
    }
    .header h1 { font-size: 22px; color: #f7931a; }
    .header .subtitle { color: #8b949e; font-size: 13px; margin-top: 2px; }
    
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .mode-toggle {
      display: flex;
      background: #21262d;
      border-radius: 8px;
      padding: 3px;
    }
    .mode-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #8b949e;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #30363d;
      color: #e6edf3;
    }
    .mode-btn:hover:not(.active) { color: #e6edf3; }

    .symbol-select {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 14px;
      color: #e6edf3;
      font-size: 14px;
      cursor: pointer;
    }
    .symbol-select:focus { outline: none; border-color: #f7931a; }

    .refresh-btn {
      background: linear-gradient(135deg, #f7931a, #e68510);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: #000;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .refresh-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(247,147,26,0.3); }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .refresh-btn .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .refresh-btn.loading .spinner { display: block; }
    .refresh-btn.loading .arrow { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Price Header */
    .price-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .current-price { font-size: 36px; font-weight: bold; color: #58a6ff; }
    .price-changes { display: flex; gap: 15px; font-size: 14px; }
    .price-changes span { color: #8b949e; }
    .price-changes .positive { color: #3fb950; }
    .price-changes .negative { color: #f85149; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 20px;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 13px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card h2 .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(247,147,26,0.15);
      color: #f7931a;
    }
    .card h2 .badge.bullish-badge { background: rgba(63,185,80,0.15); color: #3fb950; }
    .card h2 .badge.bearish-badge { background: rgba(248,81,73,0.15); color: #f85149; }
    .chart-container { position: relative; height: 280px; }
    
    /* Indicators */
    .indicators {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .indicator-box {
      background: #0d1117;
      border-radius: 8px;
      padding: 14px 10px;
      text-align: center;
    }
    .indicator-box .label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
    .indicator-box .value { font-size: 18px; font-weight: bold; }
    .indicator-box .sub { font-size: 10px; color: #8b949e; margin-top: 4px; }
    
    /* Signal Bar */
    .signal-bar {
      display: flex;
      gap: 8px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    .signal-tag {
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
    }
    .signal-tag.bearish { background: rgba(248,81,73,0.15); color: #f85149; }
    .signal-tag.bullish { background: rgba(63,185,80,0.15); color: #3fb950; }
    .signal-tag.neutral { background: rgba(139,148,158,0.15); color: #8b949e; }

    /* Fibonacci */
    .fib-section { margin-top: 15px; }
    .fib-title { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
    .fib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }
    .fib-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      background: #0d1117;
      border-radius: 6px;
      font-size: 13px;
    }
    .fib-item .level { color: #8b949e; }
    .fib-item .price { font-weight: 600; }
    .fib-item.support .price { color: #3fb950; }
    .fib-item.resist .price { color: #f85149; }

    /* MA Status */
    .ma-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 15px;
    }
    .ma-box {
      background: #0d1117;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .ma-box .ma-name { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
    .ma-box .ma-value { font-size: 16px; font-weight: 600; }
    .ma-box .ma-dir { font-size: 11px; margin-top: 4px; }
    .ma-box .ma-dir.up { color: #3fb950; }
    .ma-box .ma-dir.down { color: #f85149; }

    /* Pi Cycle */
    .pi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 15px;
    }
    .pi-box {
      background: #0d1117;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .pi-box .pi-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
    .pi-box .pi-value { font-size: 18px; font-weight: bold; }
    .pi-box .pi-sub { font-size: 10px; color: #8b949e; margin-top: 4px; }

    /* Update Time */
    .update-time {
      text-align: center;
      color: #8b949e;
      font-size: 12px;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid #21262d;
    }
    .update-time .time { color: #58a6ff; }

    /* Error State */
    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 15px;
      color: #f85149;
      text-align: center;
      margin: 20px 0;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(13,17,23,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }
    .loading-overlay.visible { opacity: 1; visibility: visible; }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #21262d;
      border-top-color: #f7931a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text { color: #8b949e; margin-top: 15px; font-size: 14px; }

    /* Responsive */
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .indicators { grid-template-columns: repeat(2, 1fr); }
      .ma-grid { grid-template-columns: repeat(2, 1fr); }
      .pi-grid { grid-template-columns: 1fr; }
      .current-price { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>加密貨幣行情儀表板</h1>
      <div class="subtitle">Binance 即時數據</div>
    </div>
    <div class="controls">
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="spot">現貨</button>
        <button class="mode-btn" data-mode="futures">期貨 USDT-M</button>
      </div>
      <select class="symbol-select" id="symbolSelect">
        <optgroup label="熱門幣種">
          <option value="BTCUSDT">BTC 比特幣</option>
          <option value="ETHUSDT">ETH 以太坊</option>
          <option value="BNBUSDT">BNB</option>
          <option value="SOLUSDT">SOL Solana</option>
          <option value="XRPUSDT">XRP</option>
          <option value="ADAUSDT">ADA</option>
          <option value="DOGEUSDT">DOGE</option>
          <option value="AVAXUSDT">AVAX</option>
          <option value="DOTUSDT">DOT</option>
          <option value="MATICUSDT">MATIC</option>
        </optgroup>
        <optgroup label="期貨專屬">
          <option value="GOOGLUSDT">GOOGL</option>
          <option value="NVDAUSDT">NVDA</option>
          <option value="AAPLUSDT">AAPL</option>
        </optgroup>
      </select>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">
        <div class="spinner"></div>
        <span class="arrow">↻</span>
        <span>更新數據</span>

    </div>
  </div>

  <div class="price-header">
    <div>
      <div class="current-price" id="currentPrice">--</div>
    </div>
    <div class="price-changes" id="priceChanges">
      <span>24h: <span class="positive" id="change24h">--</span></span>
      <span>7d: <span class="positive" id="change7d">--</span></span>
      <span>30d: <span class="negative" id="change30d">--</span></span>
    </div>
  </div>

  <div id="errorContainer"></div>

  <div class="grid">
    <!-- 價格 + 布林帶圖表 -->
    <div class="card">
      <h2>價格 & 布林帶 (20,2) <span class="badge" id="chartBadge">30日</span></h2>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
      <div class="signal-bar" id="priceSignal"></div>
    </div>

    <!-- RSI 圖表 -->
    <div class="card">
      <h2>RSI (14) <span class="badge" id="rsiBadge">--</span></h2>
      <div class="chart-container">
        <canvas id="rsiChart"></canvas>
      </div>
      <div class="signal-bar" id="rsiSignal"></div>
    </div>

    <!-- MACD 圖表 -->
    <div class="card">
      <h2>MACD (12,26,9) <span class="badge" id="macdBadge">--</span></h2>
      <div class="chart-container">
        <canvas id="macdChart"></canvas>
      </div>
      <div class="signal-bar" id="macdSignal"></div>
    </div>

    <!-- KD 圖表 -->
    <div class="card">
      <h2>KD (14) <span class="badge" id="kdBadge">K:-- D:--</span></h2>
      <div class="chart-container">
        <canvas id="kdChart"></canvas>
      </div>
      <div class="signal-bar" id="kdSignal"></div>
    </div>
  </div>

  <!-- 技術指標數值面板 -->
  <div class="card" style="margin-top:20px;">
    <h2>關鍵指標數值</h2>
    <div class="indicators">
      <div class="indicator-box">
        <div class="label">布林上軌</div>
        <div class="value" style="color:#f85149;" id="bbUpper">--</div>
        <div class="sub" id="bbUpperPct">--</div>
      </div>
      <div class="indicator-box">
        <div class="label">布林中軌</div>
        <div class="value" style="color:#58a6ff;" id="bbMiddle">--</div>
        <div class="sub">20日均線</div>
      </div>
      <div class="indicator-box">
        <div class="label">布林下軌</div>
        <div class="value" style="color:#3fb950;" id="bbLower">--</div>
        <div class="sub" id="bbLowerPct">--</div>
      </div>
      <div class="indicator-box">
        <div class="label">ATR (14)</div>

    </div>
  </div>

  <!-- 斐波那契 + MA -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
    <!-- 斐波那契 -->
    <div class="card">
      <h2>斐波那契支撐/壓力（30日）</h2>
      <div class="fib-section">
        <div class="fib-title">支撐位</div>
        <div class="fib-grid" id="fibSupport"></div>
      </div>
      <div class="fib-section" style="margin-top:15px;">
        <div class="fib-title">壓力位</div>
        <div class="fib-grid" id="fibResist"></div>
      </div>
    </div>

    <!-- MA 均線 -->
    <div class="card">
      <h2>MA 均線狀態</h2>
      <div class="ma-grid" id="maGrid"></div>
    </div>
  </div>

  <!-- Pi Cycle Top -->
  <div class="card" style="margin-top:20px;">
    <h2>Pi Cycle Top 指標</h2>
    <div class="pi-grid" id="piGrid"></div>
  </div>

  <div class="update-time">
    數據來源：Binance API | 更新時間：<span class="time" id="updateTime">--</span>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在獲取行情數據...</div>
  </div>

<script>
// State
let currentMode = 'spot';
let currentSymbol = 'BTCUSDT';
let charts = {};

// Config
const SPOT_BASE = 'https://api.binance.com';
const FUTURES_BASE = 'https://fapi.binance.com';
const COIN_NAMES = {
  BTC: '比特幣', ETH: '以太坊', BNB: 'BNB', SOL: 'Solana',
  XRP: 'XRP', ADA: 'ADA', DOGE: 'DOGE', AVAX: 'AVAX',
  DOT: 'DOT', MATIC: 'MATIC', GOOGL: 'Google', NVDA: 'NVIDIA', AAPL: 'Apple'
};

function getCoinName(symbol) {
  const base = symbol.replace('USDT', '');
  return COIN_NAMES[base] || base;
}

function getBaseUrl() {
  return currentMode === 'futures' ? FUTURES_BASE : SPOT_BASE;
}

// Mode Toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    fetchData();
  });
});

// Symbol Select
document.getElementById('symbolSelect').addEventListener('change', (e) => {
  currentSymbol = e.target.value;
  fetchData();
});

// Format helpers
function formatPrice(price, decimals = 2) {
  const p = parseFloat(price);
  if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  if (p >= 1) return '$' + p.toFixed(decimals);
  return '$' + p.toFixed(6);
}

function formatPercent(val) {
  const v = parseFloat(val);
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

// Show/Hide Loading
function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('visible', show);
}

function setBtnLoading(loading) {
  document.getElementById('refreshBtn').classList.toggle('loading', loading);
}

// Error Display
function showError(msg) {
  document.getElementById('errorContainer').innerHTML = `<div class="error-msg">${msg}</div>`;
}
function clearError() {
  document.getElementById('errorContainer').innerHTML = '';
}

// Calculate SMA
function sma(data, period) {
  const result = [];
  for (let i = period - 1; i < data.length; i++) {
    const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0);
    result.push(sum / period);
  }
  return result;
}

// Calculate RSI
function calculateRSI(prices, period = 14) {
  const changes = [];
  for (let i = 1; i < prices.length; i++) {
    changes.push(prices[i] - prices[i - 1]);
  }
  
  let avgGain = 0, avgLoss = 0;
  for (let i = 0; i < period; i++) {
    if (changes[i] > 0) avgGain += changes[i];
    else avgLoss -= changes[i];
  }
  avgGain /= period;
  avgLoss /= period;
  
  const rsi = [100 - (100 / (1 + avgGain / (avgLoss || 0.0001)))];
  
  for (let i = period; i < changes.length; i++) {
    const gain = changes[i] > 0 ? changes[i] : 0;
    const loss = changes[i] < 0 ? -changes[i] : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    rsi.push(100 - (100 / (1 + avgGain / (avgLoss || 0.0001))));
  }
  return rsi;
}

// Calculate Stochastic KD
function calculateKD(highs, lows, closes, period = 14) {
  const k = [], d = [];
  for (let i = period - 1; i < closes.length; i++) {
    const highSlice = highs.slice(i - period + 1, i + 1);
    const lowSlice = lows.slice(i - period + 1, i + 1);
    const highestHigh = Math.max(...highSlice);
    const lowestLow = Math.min(...lowSlice);
    const kVal = ((closes[i] - lowestLow) / (highestHigh - lowestLow || 1)) * 100;
    k.push(kVal);
  }
  for (let i = 2; i < k.length; i++) {
    d.push(sma(k, 3)[i - 3]);
  }
  return { k: k.slice(-30), d: d.slice(-30) };
}

// Calculate ATR
function calculateATR(highs, lows, closes, period = 14) {
  const trs = [];
  for (let i = 1; i < highs.length; i++) {
    trs.push(Math.max(
      highs[i] - lows[i],
      Math.abs(highs[i] - closes[i - 1]),
      Math.abs(lows[i] - closes[i - 1])
    ));
  }
  return sma(trs, period);
}

// Calculate Bollinger Bands
function calculateBB(prices, period = 20, stdDev = 2) {
  const middle = sma(prices, period);
  const upper = [], lower = [];
  for (let i = period - 1; i < prices.length; i++) {
    const slice = prices.slice(i - period + 1, i + 1);
    const mean = middle[i - period + 1];
    const variance = slice.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / period;
    const std = Math.sqrt(variance);
    upper.push(mean + stdDev * std);
    lower.push(mean - stdDev * std);
  }
  return { upper, middle, lower };
}

// Calculate Fibonacci
function calculateFib(low, high) {
  const diff = high - low;
  return {
    levels: [
      { label: '0%', value: low },
      { label: '23.6%', value: low + diff * 0.236 },
      { label: '38.2%', value: low + diff * 0.382 },
      { label: '50%', value: low + diff * 0.5 },
      { label: '61.8%', value: low + diff * 0.618 },
      { label: '78.6%', value: low + diff * 0.786 },
      { label: '100%', value: high },
    ],
    extensions: [
      { label: '113%', value: high + diff * 0.13 },
      { label: '127%', value: high + diff * 0.27 },
      { label: '141%', value: high + diff * 0.41 },
      { label: '161.8%', value: high + diff * 0.618 },
    ]
  };
}

// Main Fetch
async function fetchData() {
  setBtnLoading(true);
  showLoading(true);
  clearError();
  
  try {
    const base = getBaseUrl();
    const limit = 400;
    
    // Fetch klines
    const endpoint = currentMode === 'futures' 
      ? `${base}/fapi/v1/klines?symbol=${currentSymbol}&interval=1d&limit=${limit}`
      : `${base}/api/v3/klines?symbol=${currentSymbol}&interval=1d&limit=${limit}`;
    
    const response = await fetch(endpoint);
    if (!response.ok) throw new Error(`API錯誤: ${response.status}`);
    const data = await response.json();
    
    if (!data || data.length === 0) throw new Error('無數據返回');

    // Parse klines
    const closes = data.map(d => parseFloat(d[4]));
    const highs = data.map(d => parseFloat(d[2]));
    const lows = data.map(d => parseFloat(d[3]));
    const times = data.map(d => {
      const date = new Date(d[0]);
      return date.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
    });

    // Current price
    const currentPrice = closes[closes.length - 1];
    const prevPrice = closes[closes.length - 2] || closes[closes.length - 1];
    const change24h = ((currentPrice - prevPrice) / prevPrice) * 100;

    // 7d change (5 days ago vs now)
    const change7d = closes.length >= 7 ? ((currentPrice - closes[closes.length - 7]) / closes[closes.length - 7]) * 100 : 0;
    
    // 30d change
    const change30d = closes.length >= 30 ? ((currentPrice - closes[closes.length - 30]) / closes[closes.length - 30]) * 100 : 0;

    // Calculate indicators
    const bb = calculateBB(closes);
    const rsi = calculateRSI(closes);
    const kd = calculateKD(highs, lows, closes);
    const atr = calculateATR(highs, lows, closes);
    const atrVal = atr[atr.length - 1];

    // Get MA
    const ma5 = sma(closes, 5);
    const ma10 = sma(closes, 10);
    const ma20 = sma(closes, 20);
    const ma60 = sma(closes, Math.min(60, closes.length));
    const ma111 = sma(closes, 111);
    const ma350 = sma(closes, 350);

    const lastMa5 = ma5[ma5.length - 1];
    const lastMa10 = ma10[ma10.length - 1];
    const lastMa20 = ma20[ma20.length - 1];
    const lastMa60 = ma60[ma60.length - 1];
    const lastMa111 = ma111[ma111.length - 1];
    const lastMa350 = ma350[ma350.length - 1];

    // Fibonacci
    const periodLow = Math.min(...closes.slice(-30));
    const periodHigh = Math.max(...closes.slice(-30));
    const fib = calculateFib(periodLow, periodHigh);

    // MACD
    const ema12 = calculateEMA(closes, 12);
    const ema26 = calculateEMA(closes, 26);
    const macdLine = ema12.map((v, i) => v - ema26[i]);
    const signalLine = calculateEMA(macdLine, 9);
    const macdHist = macdLine.slice(-30).map((v, i) => v - signalLine[signalLine.length - 30 + i]);
    const lastMacdHist = macdHist[macdHist.length - 1];

    // Last BB
    const lastBBUpper = bb.upper[bb.upper.length - 1];
    const lastBBMiddle = bb.middle[bb.middle.length - 1];
    const lastBBLower = bb.lower[bb.lower.length - 1];
    const lastRSI = rsi[rsi.length - 1];
    const lastK = kd.k[kd.k.length - 1];
    const lastD = kd.d[kd.d.length - 1];

    // Update UI
    updatePriceUI(currentPrice, change24h, change7d, change30d);
    updateIndicatorUI(lastBBUpper, lastBBMiddle, lastBBLower, currentPrice, atrVal);
    updateFibUI(fib);
    updateMAUI(lastMa5, lastMa10, lastMa20, lastMa60, closes);
    updatePiCycleUI(lastMa111, lastMa350);
    updateSignals(bb, lastRSI, lastMacdHist, lastK, lastD, closes, ma5, ma10, ma20, ma60);

    // Update charts
    const chartLabels = times.slice(-30);
    updateCharts(closes.slice(-30), bb, rsi.slice(-30), kd, macdLine.slice(-30), signalLine.slice(-30), macdHist, chartLabels, currentPrice);

    // Update time
    document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-TW');

    // Update badges
    document.getElementById('chartBadge').textContent = currentSymbol;
    document.getElementById('rsiBadge').textContent = lastRSI.toFixed(1);
    // MACD convention: positive hist = 綠柱 (bullish/多), negative hist = 紅柱 (bearish/空)
    document.getElementById('macdBadge').textContent = lastMacdHist >= 0 ? '🟢 柱' : '🔴 柱';
    document.getElementById('macdBadge').className = 'badge ' + (lastMacdHist >= 0 ? 'bullish-badge' : 'bearish-badge');
    document.getElementById('kdBadge').textContent = `K:${lastK.toFixed(1)} D:${lastD.toFixed(1)}`;

  } catch (err) {
    console.error('Fetch error:', err);
    showError('獲取數據失敗: ' + err.message);
  } finally {
    setBtnLoading(false);
    showLoading(false);
  }
}

// EMA calculation
function calculateEMA(data, period) {
  const k = 2 / (period + 1);
  const ema = [data[0]];
  for (let i = 1; i < data.length; i++) {
    ema.push(data[i] * k + ema[i - 1] * (1 - k));
  }
  return ema;
}

function updatePriceUI(price, ch24, ch7, ch30) {
  document.getElementById('currentPrice').textContent = formatPrice(price);
  
  const ch24El = document.getElementById('change24h');
  const ch7El = document.getElementById('change7d');
  const ch30El = document.getElementById('change30d');
  
  ch24El.textContent = formatPercent(ch24);
  ch24El.className = ch24 >= 0 ? 'positive' : 'negative';
  
  ch7El.textContent = formatPercent(ch7);
  ch7El.className = ch7 >= 0 ? 'positive' : 'negative';
  
  ch30El.textContent = formatPercent(ch30);
  ch30El.className = ch30 >= 0 ? 'positive' : 'negative';
}

function updateIndicatorUI(upper, middle, lower, price, atr) {
  document.getElementById('bbUpper').textContent = formatPrice(upper);
  document.getElementById('bbUpperPct').textContent = '+' + ((upper - price) / price * 100).toFixed(2) + '%';
  
  document.getElementById('bbMiddle').textContent = formatPrice(middle);
  document.getElementById('bbLower').textContent = formatPrice(lower);
  document.getElementById('bbLowerPct').textContent = ((lower - price) / price * 100).toFixed(2) + '%';
  
  document.getElementById('atr').textContent = formatPrice(atr);
}

function updateFibUI(fib) {
  const supportEl = document.getElementById('fibSupport');
  supportEl.innerHTML = fib.levels.slice(0, 4).map(l => 
    `<div class="fib-item support"><span class="level">${l.label}</span><span class="price">${formatPrice(l.value)}</span></div>`
  ).join('');
  
  const resistEl = document.getElementById('fibResist');
  resistEl.innerHTML = fib.levels.slice(-3).concat(fib.extensions).map(l => 
    `<div class="fib-item resist"><span class="level">${l.label}</span><span class="price">${formatPrice(l.value)}</span></div>`
  ).join('');
}

function updateMAUI(ma5, ma10, ma20, ma60, closes) {
  const grid = document.getElementById('maGrid');
  const currentPrice = closes[closes.length - 1];
  
  const mas = [
    { name: 'MA 5', value: ma5, price: closes[closes.length - 1] },
    { name: 'MA 10', value: ma10, price: closes[closes.length - 1] },
    { name: 'MA 20', value: ma20, price: closes[closes.length - 1] },
    { name: 'MA 60', value: ma60, price: closes[closes.length - 1] }
  ];
  
  grid.innerHTML = mas.map(ma => {
    const dir = ma.value > ma.price ? 'up' : 'down';
    const dirText = ma.value > ma.price ? '▲ 多頭' : '▼ 空頭';
    return `
      <div class="ma-box">
        <div class="ma-name">${ma.name}</div>
        <div class="ma-value" style="color:${dir === 'up' ? '#3fb950' : '#f85149'}">${formatPrice(ma.value)}</div>
        <div class="ma-dir ${dir}">${dirText}</div>
      </div>
    `;
  }).join('');
}

function updatePiCycleUI(ma111, ma350) {
  const grid = document.getElementById('piGrid');
  
  // Handle insufficient data
  if (!ma111 || !ma350 || isNaN(ma111) || isNaN(ma350) || ma350 === 0) {
    grid.innerHTML = `
      <div class="pi-box" style="grid-column: 1 / -1;">
        <div class="pi-label" style="color:#8b949e;">Pi Cycle Top</div>
        <div class="pi-value" style="color:#8b949e;">需要更多歷史數據</div>
        <div class="pi-sub">至少需要 350 日 K 線數據</div>
      </div>
    `;
    return;
  }
  
  const gap = ((ma111 - ma350 * 2) / (ma350 * 2)) * 100;
  const signal = ma111 < ma350 * 2 ? '無頂部訊號' : '★ 頂部警告';
  
  grid.innerHTML = `
    <div class="pi-box">
      <div class="pi-label">MA 111</div>
      <div class="pi-value">${formatPrice(ma111)}</div>
      <div class="pi-sub">短期均線</div>
    </div>
    <div class="pi-box">
      <div class="pi-label">MA 350 x 2</div>
      <div class="pi-value">${formatPrice(ma350 * 2)}</div>
      <div class="pi-sub">長期均線x2</div>
    </div>
    <div class="pi-box">
      <div class="pi-label">差距</div>
      <div class="pi-value" style="color:${gap < 0 ? '#3fb950' : '#f85149'}">${gap.toFixed(1)}%</div>
      <div class="pi-sub">${signal}</div>
    </div>
  `;
}

function updateSignals(bb, rsi, macdHist, k, d, closes, ma5, ma10, ma20, ma60) {
  // Price signals
  const priceSignal = document.getElementById('priceSignal');
  const squeeze = (bb.upper[bb.upper.length-1] - bb.lower[bb.lower.length-1]) < 
    ((bb.upper[bb.upper.length-2] - bb.lower[bb.lower.length-2]) * 0.7);
  const maSignal = ma5[ma5.length-1] < ma10[ma10.length-1] && ma10[ma10.length-1] < ma20[ma20.length-1];
  priceSignal.innerHTML = `
    <span class="signal-tag ${maSignal ? 'bearish' : 'bullish'}">MA ${maSignal ? '空頭排列' : '多頭排列'}</span>
    <span class="signal-tag ${squeeze ? 'bullish' : 'neutral'}">${squeeze ? '擠壓中' : '未擠壓'}</span>
  `;

  // RSI signals
  const rsiSignal = document.getElementById('rsiSignal');
  const rsiState = rsi > 70 ? 'bearish' : rsi < 30 ? 'bullish' : 'neutral';
  rsiSignal.innerHTML = `<span class="signal-tag ${rsiState}">RSI ${rsi.toFixed(1)} ${rsi > 70 ? '超買' : rsi < 30 ? '超賣' : '中性'}</span>`;

  // MACD signals
  const macdSignal = document.getElementById('macdSignal');
  // MACD convention: positive hist = 🟢 綠柱 (bullish), negative hist = 🔴 紅柱 (bearish)
  macdSignal.innerHTML = `<span class="signal-tag ${macdHist >= 0 ? 'bullish' : 'bearish'}">${macdHist >= 0 ? '🟢 綠柱 (多)' : '🔴 紅柱 (空)'}</span>`;

  // KD signals
  const kdSignal = document.getElementById('kdSignal');
  const kdState = k > 80 ? 'bearish' : k < 20 ? 'bullish' : 'neutral';
  kdSignal.innerHTML = `<span class="signal-tag ${kdState}">K:${k.toFixed(1)} D:${d.toFixed(1)} ${k > 80 ? '高檔' : k < 20 ? '低檔' : '中性'}</span>`;
}

function updateCharts(closes, bb, rsi, kd, macd, signal, hist, labels, currentPrice) {
  const chartFont = { color: '#8b949e' };
  const gridColor = '#21262d';

  const commonOptions = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: gridColor }, ticks: chartFont },
      y: { grid: { color: gridColor }, ticks: chartFont }
    }
  };

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // 1. Price + BB Chart
  charts.price = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '價格',
          data: closes,
          borderColor: '#f7931a',
          backgroundColor: 'rgba(247,147,26,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: '布林上軌',
          data: bb.upper.slice(-30),
          borderColor: 'rgba(248,81,73,0.4)',
          borderDash: [4, 4],
          fill: false,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: '布林中軌',
          data: bb.middle.slice(-30),
          borderColor: 'rgba(88,166,255,0.4)',
          borderDash: [4, 4],
          fill: false,
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: '布林下軌',
          data: bb.lower.slice(-30),
          borderColor: 'rgba(63,185,80,0.4)',
          borderDash: [4, 4],
          fill: false,
          tension: 0.3,
          pointRadius: 0
        }
      ]
    },
    options: {
      ...commonOptions,
      scales: {
        x: { grid: { color: gridColor }, ticks: { ...chartFont, maxTicksLimit: 8 } },
        y: { ...commonOptions.scales.y, ticks: { ...chartFont, callback: v => '$' + v.toLocaleString() } }
      }
    }
  });

  // 2. RSI Chart
  charts.rsi = new Chart(document.getElementById('rsiChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'RSI',
        data: rsi,
        borderColor: '#f7931a',
        backgroundColor: 'rgba(247,147,26,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 0
      }]
    },
    options: {
      ...commonOptions,
      scales: {
        x: { grid: { color: gridColor }, ticks: { ...chartFont, maxTicksLimit: 8 } },
        y: { ...commonOptions.scales.y, min: 0, max: 100, ticks: { ...chartFont, stepSize: 10 } }
      }
    }
  });

  // 3. MACD Chart
  charts.macd = new Chart(document.getElementById('macdChart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'line',
          label: 'DIF',
          data: macd,
          borderColor: '#58a6ff',
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 0
        },
        {
          type: 'line',
          label: 'Signal',
          data: signal.slice(-30),
          borderColor: '#f7931a',
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 0
        },
        {
          type: 'bar',
          label: '柱狀圖',
          data: hist,
          backgroundColor: hist.map(v => v >= 0 ? 'rgba(63,185,80,0.6)' : 'rgba(248,81,73,0.6)')
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: gridColor }, ticks: { ...chartFont, maxTicksLimit: 8 } },
        y: { grid: { color: gridColor }, ticks: chartFont }
      }
    }
  });

  // 4. KD Chart
  charts.kd = new Chart(document.getElementById('kdChart'), {
    type: 'line',
    data: {
      labels: labels.slice(-kd.k.length),
      datasets: [
        {
          label: 'K',
          data: kd.k,
          borderColor: '#58a6ff',
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 0
        },
        {
          label: 'D',
          data: kd.d,
          borderColor: '#f7931a',
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 0
        }
      ]
    },
    options: {
      ...commonOptions,
      scales: {
        x: { grid: { color: gridColor }, ticks: { ...chartFont, maxTicksLimit: 8 } },
        y: { ...commonOptions.scales.y, min: 0, max: 100, ticks: { ...chartFont, stepSize: 20 } }
      }
    }
  });
}

fetchData();
